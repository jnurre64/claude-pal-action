name: "Claude Agent: Implement"

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: >-
      github.event.label.name == 'agent:plan-approved' &&
      github.actor != '{{BOT_USER}}'
    uses: jnurre64/claude-pal-action/.github/workflows/dispatch-implement.yml@v1
    with:
      bot_user: "{{BOT_USER}}"
    secrets:
      agent_pat: ${{ secrets.AGENT_PAT }}
